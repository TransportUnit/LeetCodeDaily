name: CI (full)

# Full run: unit tests + all archived problems.
# Triggers only on infrastructure changes. Problem-only pushes are covered
# by the cheaper ci-problems.yml instead. Note: the .slnx files are
# deliberately NOT listed here — the scaffolder touches them on every
# problem push, and the runner does not use them anyway.
on:
  push:
    branches: ["**"]
    paths:
      - "LeetCodeDaily/**"
      - "Test/**"
      - "Tools/**"
      - "Problems/Directory.Build.props"
      - ".github/workflows/**"
      - "scaffold.*"
  pull_request:
    paths:
      - "LeetCodeDaily/**"
      - "Test/**"
      - "Tools/**"
      - "Problems/Directory.Build.props"
      - ".github/workflows/**"
      - "scaffold.*"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Unit tests (core library + scaffolder)
        run: dotnet test Test/LeetCodeDaily.Tests -c Release

      - name: Run all problems (integration)
        run: dotnet run --project Test/LeetCodeDaily.Runner -c Release
